<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">🌙 Dark Mode</button>
  
  <h1>🔮 Lotto Number Generator 🔮</h1>
  <p>Click the button to get your lucky numbers!</p>
  
  <div id="lotto-numbers"></div>
  
  <div class="controls">
    <button id="generate-btn">Generate Numbers</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', (event) => {
      const body = document.body;
      const themeToggle = document.getElementById('theme-toggle');
      const generateBtn = document.getElementById('generate-btn');
      const lottoNumbersDiv = document.getElementById('lotto-numbers');

      // Theme toggle logic
      themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
          themeToggle.textContent = '☀️ White Mode';
        } else {
          themeToggle.textContent = '🌙 Dark Mode';
        }
      });

      // Lotto generation logic
      function generateLottoNumbers() {
        const numbers = new Set();
        while(numbers.size < 6) {
          const randomNumber = Math.floor(Math.random() * 45) + 1;
          numbers.add(randomNumber);
        }
        
        lottoNumbersDiv.innerHTML = ''; 
        
        Array.from(numbers).sort((a,b) => a-b).forEach(number => {
          const numberSpan = document.createElement('span');
          numberSpan.textContent = number;
          numberSpan.className = 'lotto-number';
          lottoNumbersDiv.appendChild(numberSpan);
        });
      }

      generateBtn.addEventListener('click', generateLottoNumbers);
    });
  </script>
</body>
</html>
