<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">🌙 Dark Mode</button>
  
  <h1>🔮 Lotto Number Generator 🔮</h1>
  <p>Click the button to get your lucky numbers!</p>
  
  <div id="lotto-numbers"></div>
  
  <div class="controls">
    <button id="generate-btn">Generate Numbers</button>
  </div>

  <section class="contact-section">
    <h2>🤝 Partnership Inquiry</h2>
    <form action="https://formspree.io/f/mzdjpbnv" method="POST">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea name="message" id="message" placeholder="How can we work together?" required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <section class="comments-section">
    <div id="disqus_thread"></div>
    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
        /*
        var disqus_config = function () {
        this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
        this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        */
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-c4pzu0tqz8.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', (event) => {
      const body = document.body;
      const themeToggle = document.getElementById('theme-toggle');
      const generateBtn = document.getElementById('generate-btn');
      const lottoNumbersDiv = document.getElementById('lotto-numbers');

      // Theme toggle logic
      themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        if (body.classList.contains('dark-mode')) {
          themeToggle.textContent = '☀️ White Mode';
        } else {
          themeToggle.textContent = '🌙 Dark Mode';
        }
      });

      // Lotto generation logic
      function generateLottoNumbers() {
        const numbers = new Set();
        while(numbers.size < 6) {
          const randomNumber = Math.floor(Math.random() * 45) + 1;
          numbers.add(randomNumber);
        }
        
        lottoNumbersDiv.innerHTML = ''; 
        
        Array.from(numbers).sort((a,b) => a-b).forEach(number => {
          const numberSpan = document.createElement('span');
          numberSpan.textContent = number;
          numberSpan.className = 'lotto-number';
          lottoNumbersDiv.appendChild(numberSpan);
        });
      }

      generateBtn.addEventListener('click', generateLottoNumbers);
    });
  </script>
</body>
</html>
