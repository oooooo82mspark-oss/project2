<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Face Test - Dog or Cat?</title>
  <link href='style.css' rel='stylesheet'>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6653070561426309" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <button id="theme-toggle">🌙 Dark Mode</button>
  
  <div class="container">
    <h1>🐶 Animal Face Test 🐱</h1>
    <p class="subtitle">Am I a dog or a cat? Check your animal face type!</p>
    
    <div class="mode-toggle">
      <button id="btn-upload" class="mode-btn active">📁 Upload Photo</button>
      <button id="btn-webcam" class="mode-btn">🎥 Use Webcam</button>
    </div>

    <!-- Upload Section -->
    <div id="upload-section">
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <div id="upload-label">
          <p>📸 Click or drag to upload your photo</p>
        </div>
        <img id="face-image" src="#" alt="your face" />
        <input type='file' id="file-input" style="display:none;" onchange="readURL(this);" accept="image/*" />
      </div>
    </div>

    <!-- Webcam Section -->
    <div id="webcam-section" style="display:none;">
      <div id="webcam-container"></div>
      <button id="webcam-control-btn">Start Webcam</button>
    </div>

    <div id="loading" style="display:none;">Analyzing...</div>

    <div id="result-message" style="font-size: 1.5rem; font-weight: bold; margin: 20px 0;"></div>
    
    <div class="result-container" id="label-container">
      <!-- Result bars will be injected here -->
    </div>
  </div>

  <!-- AdSense Unit 1 -->
  <div style="margin: 20px 0; width: 100%; max-width: 600px;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-6653070561426309"
         data-ad-slot="auto"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <section class="lotto-section">
    <h3>🔮 Bonus: Lucky Lotto Numbers</h3>
    <div id="lotto-numbers"></div>
    <button id="generate-btn">Generate Numbers</button>
  </section>

  <section class="contact-section">
    <h2>🤝 Partnership Inquiry</h2>
    <form action="https://formspree.io/f/mzdjpbnv" method="POST">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea name="message" id="message" placeholder="How can we work together?" required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <section class="comments-section">
    <div id="disqus_thread"></div>
    <script>
        (function() { 
        var d = document, s = d.createElement('script');
        s.src = 'https://productbuilder-c4pzu0tqz8.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
  </section>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/dQxVSjCDx/";
    let model, webcam, labelContainer, maxPredictions;
    let isWebcamRunning = false;

    // Load the image model
    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();
    }

    async function predict(inputSource) {
      const prediction = await model.predict(inputSource || document.getElementById("face-image"));
      displayResults(prediction);
    }

    function displayResults(prediction) {
      const resultContainer = document.getElementById("label-container");
      resultContainer.innerHTML = '';
      
      prediction.sort((a, b) => b.probability - a.probability);
      
      document.getElementById("result-message").innerText = `You look like a ${prediction[0].className}!`;

      for (let i = 0; i < maxPredictions; i++) {
        const classPrediction = prediction[i].className;
        const probability = (prediction[i].probability * 100).toFixed(0);
        
        const barWrapper = document.createElement("div");
        barWrapper.className = "result-bar-wrapper";
        
        const colorClass = classPrediction.toLowerCase() === 'dog' ? 'dog-bar' : 'cat-bar';
        
        barWrapper.innerHTML = `
          <div class="label-container">
            <span>${classPrediction}</span>
            <span>${probability}%</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill ${colorClass}" style="width: ${probability}%"></div>
          </div>
        `;
        resultContainer.appendChild(barWrapper);
      }
    }

    // Webcam Logic
    async function setupWebcam() {
      const flip = true; 
      webcam = new tmImage.Webcam(200, 200, flip); 
      await webcam.setup(); 
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").appendChild(webcam.canvas);
      document.getElementById("webcam-container").style.display = "block";
    }

    async function loop() {
      if (!isWebcamRunning) return;
      webcam.update(); 
      await predict(webcam.canvas);
      window.requestAnimationFrame(loop);
    }

    async function toggleWebcam() {
      const btn = document.getElementById("webcam-control-btn");
      if (!isWebcamRunning) {
        btn.innerText = "Loading...";
        await setupWebcam();
        isWebcamRunning = true;
        btn.innerText = "Stop Webcam";
      } else {
        isWebcamRunning = false;
        webcam.stop();
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").style.display = "none";
        btn.innerText = "Start Webcam";
        document.getElementById("result-message").innerText = "";
        document.getElementById("label-container").innerHTML = "";
      }
    }

    function readURL(input) {
      if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('face-image');
          img.src = e.target.result;
          img.style.display = 'block';
          document.getElementById('upload-label').style.display = 'none';
          
          document.getElementById('loading').style.display = 'block';
          predict().then(() => {
            document.getElementById('loading').style.display = 'none';
          });
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    document.addEventListener('DOMContentLoaded', (event) => {
      init();

      // Mode toggle logic
      const btnUpload = document.getElementById('btn-upload');
      const btnWebcam = document.getElementById('btn-webcam');
      const uploadSection = document.getElementById('upload-section');
      const webcamSection = document.getElementById('webcam-section');

      btnUpload.addEventListener('click', () => {
        if (isWebcamRunning) toggleWebcam();
        btnUpload.classList.add('active');
        btnWebcam.classList.remove('active');
        uploadSection.style.display = 'block';
        webcamSection.style.display = 'none';
        document.getElementById("result-message").innerText = "";
        document.getElementById("label-container").innerHTML = "";
      });

      btnWebcam.addEventListener('click', () => {
        btnWebcam.classList.add('active');
        btnUpload.classList.remove('active');
        uploadSection.style.display = 'none';
        webcamSection.style.display = 'block';
        document.getElementById("result-message").innerText = "";
        document.getElementById("label-container").innerHTML = "";
      });

      document.getElementById("webcam-control-btn").addEventListener('click', toggleWebcam);

      // Theme toggle logic
      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        themeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️ White Mode' : '🌙 Dark Mode';
      });

      // Lotto logic
      const generateBtn = document.getElementById('generate-btn');
      generateBtn.addEventListener('click', () => {
        const numbers = new Set();
        while(numbers.size < 6) { numbers.add(Math.floor(Math.random() * 45) + 1); }
        const div = document.getElementById('lotto-numbers');
        div.innerHTML = ''; 
        Array.from(numbers).sort((a,b) => a-b).forEach(n => {
          const s = document.createElement('span');
          s.textContent = n; s.className = 'lotto-number';
          div.appendChild(s);
        });
      });
    });
  </script>
</body>
</html>
